<!DOCTYPE html>
<html>
<head>
  <title>Hustle Tracker</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<h2>💰 Hustle Tracker</h2>

<div id="auth">
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <button onclick="logout()">Logout</button>

  <h3>Add Task</h3>
  <input id="taskInput">
  <button onclick="addTask()">Add</button>

  <ul id="tasks"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCJwYB5tOa5zpZxZhp6h_QkvNgpFcCEeOU",
  authDomain: "student-hustle-tracker.firebaseapp.com",
  databaseURL: "https://student-hustle-tracker-default-rtdb.firebaseio.com",
  projectId: "student-hustle-tracker",
  storageBucket: "student-hustle-tracker.firebasestorage.app",
  messagingSenderId: "594345490240",
  appId: "1:594345490240:web:59c71df98059b5bc3aaca5"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function register(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Registered successfully"))
    .catch(err => alert(err.message));
}

function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .catch(err => alert(err.message));
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    loadTasks(user.uid);
  }
});

function addTask(){
  const text = document.getElementById("taskInput").value;

  db.collection("users").doc(auth.currentUser.uid)
    .collection("tasks")
    .add({text: text})
    .then(() => loadTasks(auth.currentUser.uid));
}

function loadTasks(uid){
  db.collection("users").doc(uid)
    .collection("tasks")
    .get().then(snapshot => {
      const list = document.getElementById("tasks");
      list.innerHTML="";
      snapshot.forEach(doc=>{
        list.innerHTML += `<li>${doc.data().text}</li>`;
      });
    });
}
</script>
