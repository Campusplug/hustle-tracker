<!DOCTYPE html>
<html>
<head>
  <title>Hustle Tracker</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      margin: 15px auto;
      max-width: 400px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    .logout { background: #ef4444; }

    .task {
      background: #334155;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
    }

    .leader {
      background: #1d4ed8;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>💰 Hustle Tracker</h1>

<div id="auth" class="card">
  <input id="username" placeholder="Username">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

  <div class="card">
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- Earnings -->
  <div class="card">
    <h3>💸 Earnings</h3>
    <input id="earningInput" placeholder="Amount (R)">
    <button onclick="addEarning()">Add</button>
    <h2>Total: R <span id="totalEarnings">0</span></h2>
  </div>

  <!-- Leaderboard -->
  <div class="card">
    <h3>🏆 Leaderboard</h3>
    <div id="leaderboard"></div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCJwYB5tOa5zpZxZhp6h_QkvNgpFcCEeOU",
  authDomain: "student-hustle-tracker.firebaseapp.com",
  projectId: "student-hustle-tracker"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Register with username
function register(){
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .then(userCred => {
      return db.collection("users").doc(userCred.user.uid).set({
        username: username.value,
        total: 0
      });
    })
    .catch(err => alert(err.message));
}

function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(err => alert(err.message));
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  if(user){
    authDiv(false);
    loadEarnings(user.uid);
    loadLeaderboard();
  } else {
    authDiv(true);
  }
});

function authDiv(show){
  document.getElementById("auth").style.display = show ? "block" : "none";
  document.getElementById("app").style.display = show ? "none" : "block";
}

// Earnings
function addEarning(){
  let amount = Number(earningInput.value);

  let userRef = db.collection("users").doc(auth.currentUser.uid);

  userRef.get().then(doc=>{
    let current = doc.data().total || 0;
    let newTotal = current + amount;

    userRef.update({ total: newTotal })
      .then(() => {
        loadEarnings(auth.currentUser.uid);
        loadLeaderboard();
      });
  });
}

function loadEarnings(uid){
  db.collection("users").doc(uid).get().then(doc=>{
    document.getElementById("totalEarnings").innerText = doc.data().total || 0;
  });
}

// Leaderboard
function loadLeaderboard(){
  db.collection("users")
    .orderBy("total","desc")
    .limit(10)
    .get()
    .then(snapshot=>{
      leaderboard.innerHTML="";
      let rank=1;

      snapshot.forEach(doc=>{
        let data = doc.data();

        leaderboard.innerHTML += `
          <div class="leader">
            #${rank} - ${data.username} : R${data.total}
          </div>
        `;
        rank++;
      });
    });
}
</script>

</body>
</html>
