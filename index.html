<!DOCTYPE html>
<html>
<head>
  <title>Hustle Tracker</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      margin: 15px auto;
      max-width: 400px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    .logout { background: #ef4444; }

    .task {
      background: #334155;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
    }

    .progress-bar {
      width: 100%;
      background: #334155;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress {
      height: 10px;
      background: #22c55e;
      width: 0%;
    }
  </style>
</head>

<body>

<h1>💰 Hustle Tracker</h1>

<div id="auth" class="card">
  <h3>Login / Register</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

  <div class="card">
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- 💸 Earnings Tracker -->
  <div class="card">
    <h3>💸 Earnings Tracker</h3>
    <input id="earningInput" placeholder="Enter amount (R)">
    <button onclick="addEarning()">Add Earnings</button>
    <h2>Total: R <span id="totalEarnings">0</span></h2>
  </div>

  <!-- Tasks -->
  <div class="card">
    <h3>Add Daily Task</h3>
    <input id="taskInput" placeholder="e.g Post 2 reels">
    <button onclick="addTask()">Add Task</button>
  </div>

  <div class="card">
    <h3>Progress</h3>
    <div class="progress-bar">
      <div id="progress" class="progress"></div>
    </div>
  </div>

  <div class="card">
    <h3>Your Tasks</h3>
    <div id="tasks"></div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCJwYB5tOa5zpZxZhp6h_QkvNgpFcCEeOU",
  authDomain: "student-hustle-tracker.firebaseapp.com",
  projectId: "student-hustle-tracker"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function register(){
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .catch(err => alert(err.message));
}

function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(err => alert(err.message));
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    loadTasks(user.uid);
    loadEarnings(user.uid);
  } else {
    document.getElementById("auth").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

function addTask(){
  db.collection("users").doc(auth.currentUser.uid)
    .collection("tasks")
    .add({text: taskInput.value, done:false})
    .then(() => loadTasks(auth.currentUser.uid));
}

function toggleTask(id, done){
  db.collection("users").doc(auth.currentUser.uid)
    .collection("tasks").doc(id)
    .update({done: !done})
    .then(() => loadTasks(auth.currentUser.uid));
}

function loadTasks(uid){
  db.collection("users").doc(uid)
    .collection("tasks")
    .get().then(snapshot => {

      let total=0, completed=0;
      tasks.innerHTML="";

      snapshot.forEach(doc=>{
        let data=doc.data();
        total++;
        if(data.done) completed++;

        tasks.innerHTML += `
          <div class="task" onclick="toggleTask('${doc.id}', ${data.done})">
            ${data.done ? "✅" : "⬜"} ${data.text}
          </div>`;
      });

      let progress = total ? (completed/total)*100 : 0;
      document.getElementById("progress").style.width = progress + "%";
    });
}

// 💸 Earnings logic
function addEarning(){
  let amount = Number(document.getElementById("earningInput").value);

  db.collection("users").doc(auth.currentUser.uid)
    .collection("earnings")
    .add({amount: amount})
    .then(() => loadEarnings(auth.currentUser.uid));
}

function loadEarnings(uid){
  db.collection("users").doc(uid)
    .collection("earnings")
    .get().then(snapshot => {

      let total = 0;

      snapshot.forEach(doc=>{
        total += doc.data().amount;
      });

      document.getElementById("totalEarnings").innerText = total;
    });
}
</script>

</body>
</html>
